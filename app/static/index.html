<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="grid-bg"></div>

  <nav class="navbar">
    <a class="navbar-logo" href="#/documents">
      <span class="logo-mark">D</span>DocChat
    </a>
    <div class="navbar-links">
      <a class="nav-link" href="#/documents" data-view="documents">Documents</a>
      <a class="nav-link" href="#/conversations" data-view="conversations">Conversations</a>
    </div>
    <div class="health-indicator" id="healthIndicator">
      <span class="health-dot" id="healthDot"></span>
      <span class="health-label" id="healthLabel">Checking</span>
    </div>
  </nav>

  <div class="app" id="app"></div>

  <!-- Upload modal -->
  <div class="modal-backdrop" id="uploadModal" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-label="Upload document">
      <div class="modal-header">
        <h2>Upload document</h2>
        <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">📄</div>
        <p class="drop-title">Drop your file here</p>
        <p class="drop-sub">PDF, DOCX, or TXT · up to 10 MB</p>
        <label class="btn-upload-label" for="fileInput">Browse files</label>
        <input type="file" id="fileInput" accept=".pdf,.docx,.txt" hidden />
      </div>
      <div class="upload-progress" id="uploadProgress" hidden>
        <div class="progress-header">
          <span class="progress-filename" id="progressFilename"></span>
          <span class="progress-state" id="progressState"></span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <p class="progress-hint" id="progressHint"></p>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
